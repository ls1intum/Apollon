services:
  db:
    image: redis/redis-stack-server:7.4.0-v8
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - dbdata:/data
    command:
      - redis-stack-server
      # `redis-stack-server` defaults `dir` to `/var/lib/redis-stack`, not
      # `/data` like upstream `redis`. Without `--dir /data` the server
      # writes its AOF/RDB into the container's writable layer, which is
      # lost on container recreate.
      - --dir
      - /data
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec

volumes:
  dbdata:
