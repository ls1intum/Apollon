services:
  db:
    # Stack image is required: the server's RedisJSON gate refuses to boot
    # without the ReJSON module. `redis:7-alpine` ships without it and would
    # silently break versioning on a fresh deploy.
    image: redis/redis-stack-server:7.4.0-v0
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - dbdata:/data
    networks:
      - apollon-network
    command:
      - redis-stack-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  dbdata:

networks:
  apollon-network:
    name: apollon-network
    external: true
