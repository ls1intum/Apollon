packages:
  - "library"
  - "packages/*"
  - "standalone/*"
  - "vscode-extension"
  - "vscode-extension/webview"
  - "docs"

# Inject workspace deps as real packages, not symlinks, so `pnpm deploy`
# produces a self-contained server runtime image.
injectWorkspacePackages: true

# Supply-chain hardening. Dependency-age cooldown is owned by Renovate
# (minimumReleaseAge in renovate.json), which is the single soak authority:
# a pnpm-level age floor rejects the exact versions Renovate pins in the
# catalog/overrides and blocks it from regenerating the lockfile.
blockExoticSubdeps: true

# Shared version pins across 2+ workspaces. Each workspace package.json
# references the entry via `"<pkg>": "catalog:"` instead of a duplicate
# version string, so Renovate bumps a dep in one place instead of N.
catalog:
  "@base-ui/react": "1.6.0"
  "@eslint/js": "10.0.1"
  # eslint-plugin-react has no ESLint-10 release; @eslint-react is flat-config +
  # ESLint-10 native.
  "@eslint-react/eslint-plugin": "5.9.3"
  "@resvg/resvg-wasm": "2.6.2"
  "@size-limit/file": "12.1.0"
  "@size-limit/preset-big-lib": "12.1.0"
  # Storybook 10.x — all @storybook/* MUST share one exact version.
  storybook: "10.4.6"
  "@storybook/react-vite": "10.4.6"
  "@storybook/addon-docs": "10.4.6"
  "@storybook/addon-a11y": "10.4.6"
  "@storybook/addon-themes": "10.4.6"
  "@storybook/addon-vitest": "10.4.6"
  # `@playwright/test` (e2e + visual) and `playwright` (the browser-test provider
  # API, via @vitest/browser-playwright) are kept on ONE version so the workspace
  # resolves a single `playwright-core` + browser-binary set — no drift. Pinned to
  # match CI's v1.61.1-noble image and the committed visual baselines;
  # @vitest/browser-playwright accepts any playwright (peer `*`) and its Storybook
  # browser tests run locally only. Both packages ship a `playwright` CLI bin, so
  # e2e/visual invoke @playwright/test's CLI directly (see webapp test:e2e /
  # test:visual) to avoid the bin collision.
  "@playwright/test": "1.61.1"
  playwright: "1.61.1"
  "@tailwindcss/vite": "4.3.1"
  "@testing-library/jest-dom": "6.9.1"
  "@testing-library/react": "16.3.2"
  "@types/node": "26.0.1"
  "@types/react": "19.2.17"
  "@types/react-dom": "19.2.3"
  "@types/vscode-webview": "1.57.5"
  "@vitejs/plugin-react": "6.0.3"
  "@vitest/browser": "4.1.9"
  "@vitest/browser-playwright": "4.1.9"
  "@vitest/coverage-v8": "4.1.9"
  "@xyflow/react": "12.11.1"
  # React Compiler (stable v1). Wired via @vitejs/plugin-react's Babel slot.
  # Pinned exact — the compiler has not committed to SemVer-safe output yet.
  babel-plugin-react-compiler: "1.0.0"
  class-variance-authority: "0.7.1"
  clsx: "2.1.1"
  eslint: "10.6.0"
  eslint-plugin-react-hooks: "7.1.1"
  globals: "17.7.0"
  jsdom: "29.1.1"
  jspdf: "4.2.1"
  lucide-react: "1.22.0"
  react: "19.2.7"
  react-dom: "19.2.7"
  size-limit: "12.1.0"
  "svg2pdf.js": "2.7.0"
  tailwind-merge: "3.6.0"
  tailwindcss: "4.3.1"
  typescript: "6.0.3"
  typescript-eslint: "8.62.0"
  vite: "8.1.0"
  vitest: "4.1.9"
  # Yjs is a CRDT singleton: the library externalizes it and its hosts must share
  # exactly one copy, so the client workspaces pin one version here.
  "y-protocols": "1.0.7"
  yjs: "13.6.31"
  zustand: "5.0.14"

overrides:
  "@eslint/plugin-kit": ">=0.3.4" # GHSA-7q7g-4xm8-89cq
  "@xmldom/xmldom": ">=0.8.12" # GHSA-9pgh-qqpf-7wqj
  "brace-expansion": ">=2.0.2" # GHSA-v6h2-p8h4-qcjw
  "esbuild": "0.28.1" # evanw/esbuild#4436 — regression, not a CVE
  "flatted": ">=3.4.2" # GHSA-rwm2-mxc8-7m93
  "handlebars": ">=4.7.9" # GHSA-q42p-pg8m-cqh6
  "lodash": ">=4.17.21" # GHSA-jf85-cpcp-j695 (CVE-2019-10744 fixed in 4.17.12)
  "minimatch": ">=3.0.5" # GHSA-f8q6-p94x-37v3
  "picomatch": ">=4.0.4" # GHSA-9pwm-9w4j-c7q4
  "tar": ">=6.2.1" # GHSA-f5x3-32g6-xq36 (CVE-2024-28863)

# pnpm 10+ blocks lifecycle scripts by default.
allowBuilds:
  "@parcel/watcher": false # Storybook transitive; optional native FS watcher
  "@swc/core": true # docusaurus-faster (Rspack + SWC build path)
  "@vscode/vsce-sign": true
  "core-js": false # jspdf transitive; "thank-you" postinstall, no native build
  "cpu-features": true
  "esbuild": true
  protobufjs: false # testcontainers→dockerode transitive; pure-JS, no native build
  "sharp": true
  "ssh2": true
