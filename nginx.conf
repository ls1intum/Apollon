server {
    listen 8080;
    server_name _;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # Data-minimisation at source: disable per-request access logs so no
    # client IP, user-agent, or URL is emitted by the webapp container.
    # Restrict error logs to crit level — nginx's default error format
    # includes the client IP, so anything below crit could capture PII.
    access_log off;
    error_log /dev/stderr crit;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml text/markdown;
    gzip_min_length 1000;

    # Operator-mounted override directory. Runtime-editable (no-cache), never
    # served for non-.md paths to shrink the attack surface of the mount.
    location /legal-overrides/ {
        location ~* \.md$ {
            types { } default_type "text/markdown; charset=utf-8";
            add_header Cache-Control "no-cache, must-revalidate" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header X-Robots-Tag "noindex, nofollow" always;
            try_files $uri =404;
        }
        return 404;
    }

    # Image-bundled profile + disclaimer. Content is immutable per image
    # build, so clients may cache briefly but must revalidate.
    location /legal/ {
        location ~* \.md$ {
            types { } default_type "text/markdown; charset=utf-8";
            add_header Cache-Control "public, max-age=300, must-revalidate" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header X-Robots-Tag "noindex, nofollow" always;
            try_files $uri =404;
        }
        return 404;
    }

    # Runtime env bootstrap (written by entrypoint.sh). Must not be cached
    # so a container restart with a different LEGAL_PROFILE takes effect
    # on the next page load.
    location = /env.js {
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        types { } default_type "application/javascript; charset=utf-8";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite uses content hashing)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Repeat security headers — nginx drops parent add_header in location blocks
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }
}
