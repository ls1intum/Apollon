# Fallback only: shapes GitHub's `--generate-notes`, used when a release carries
# no changeset (rare). Categories/order mirror scripts/extract-changelog.mjs, but
# GitHub groups by PR LABEL not commit type and there's no auto-labeler, so an
# unlabeled PR collapses into the `*` catch-all (Other Changes). The normal
# changeset path (extract-changelog.mjs) needs no labels.
changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - github-actions
      - dependabot
  categories:
    - title: Breaking Changes
      labels:
        - breaking-change
        - "breaking change"
    - title: Features
      labels:
        - feat
        - enhancement
    - title: Bug Fixes
      labels:
        - fix
        - bug
    - title: Performance
      labels:
        - perf
        - performance
    - title: Documentation
      labels:
        - docs
        - documentation
    - title: Dependencies
      labels:
        - dependencies
        - deps
    - title: Other Changes
      labels:
        - "*"
