name: Release Standalone

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-standalone
  cancel-in-progress: false

permissions: {}

jobs:
  verify:
    name: Verify tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Tag must point to a commit on main
        run: |
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag $GITHUB_REF_NAME points to $GITHUB_SHA, which is not on main. Refusing to release."
            exit 1
          fi

      - name: Tag must not already have a GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::Release $GITHUB_REF_NAME already exists. Bump the standalone version instead of re-pushing the same tag."
            exit 1
          fi

      - name: Tag must be strict SemVer and greater than the latest v* tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [[ "$TAG_VERSION" == *-* || "$TAG_VERSION" == *+* ]]; then
            echo "::error::Tag $GITHUB_REF_NAME is not strict SemVer MAJOR.MINOR.PATCH."
            exit 1
          fi
          LATEST=$(git tag --list 'v*' --sort=-v:refname | grep -Fxv "$GITHUB_REF_NAME" | head -n1 | sed 's/^v//' || true)
          if [ -n "$LATEST" ]; then
            HIGHEST=$(printf '%s\n%s\n' "$LATEST" "$TAG_VERSION" | sort -V | tail -n1)
            if [ "$HIGHEST" != "$TAG_VERSION" ] || [ "$LATEST" = "$TAG_VERSION" ]; then
              echo "::error::Tag v$TAG_VERSION is not strictly greater than latest standalone tag v$LATEST."
              exit 1
            fi
          fi

      - name: Extract and verify standalone version
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          WEBAPP_VERSION=$(node -p "require('./standalone/webapp/package.json').version")
          SERVER_VERSION=$(node -p "require('./standalone/server/package.json').version")

          if [ "$WEBAPP_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::standalone/webapp/package.json has $WEBAPP_VERSION but tag is v$TAG_VERSION"
            exit 1
          fi
          if [ "$SERVER_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::standalone/server/package.json has $SERVER_VERSION but tag is v$TAG_VERSION"
            exit 1
          fi

          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify Docker images exist for this commit
        run: |
          for IMAGE in \
            ghcr.io/ls1intum/apollon/apollon-webapp \
            ghcr.io/ls1intum/apollon/apollon-server; do
            if ! docker buildx imagetools inspect "$IMAGE:sha-$GITHUB_SHA" > /dev/null 2>&1; then
              echo "::error::Missing image $IMAGE:sha-$GITHUB_SHA. The push-to-main Docker build for this commit must finish green before the tag can be released."
              exit 1
            fi
          done

  tag-docker-images:
    name: Tag and Sign Docker Images
    needs: [verify]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      packages: write # retag images in GHCR
      id-token: write # OIDC for keyless cosign signing
    strategy:
      matrix:
        image:
          - ghcr.io/ls1intum/apollon/apollon-webapp
          - ghcr.io/ls1intum/apollon/apollon-server
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@d7543c93d881b35a8faa02e8e3605f69b7a1ce62 # v3.10.0

      - name: Retag and sign
        run: |
          VERSION="${{ needs.verify.outputs.version }}"
          IMAGE="${{ matrix.image }}"
          COMMIT_SHA="${{ github.sha }}"

          docker buildx imagetools create \
            --tag "$IMAGE:$VERSION" \
            "$IMAGE:sha-$COMMIT_SHA"

          DIGEST=$(docker buildx imagetools inspect "$IMAGE:$VERSION" --format '{{.Manifest.Digest}}')
          cosign sign --yes "$IMAGE@$DIGEST"

  create-release:
    name: Create GitHub Release
    needs: [verify, tag-docker-images]
    if: always() && needs.tag-docker-images.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          name: "v${{ needs.verify.outputs.version }}"
          generate_release_notes: true
          body: |
            ## Standalone release

            - `ghcr.io/ls1intum/apollon/apollon-webapp:${{ needs.verify.outputs.version }}` (cosign-signed)
            - `ghcr.io/ls1intum/apollon/apollon-server:${{ needs.verify.outputs.version }}` (cosign-signed)

            Library (`@tumaet/apollon`) releases independently under `@tumaet/apollon@<x.y.z>` tags.
          prerelease: false

  deploy-staging:
    name: Deploy to Staging
    needs: [verify, tag-docker-images]
    if: always() && needs.tag-docker-images.result == 'success'
    uses: ./.github/workflows/deploy-staging.yml
    with:
      image-tag: ${{ needs.verify.outputs.version }}
      deploy-app: true
    secrets: inherit
