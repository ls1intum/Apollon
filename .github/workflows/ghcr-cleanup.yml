name: GHCR Cleanup

on:
  schedule:
    - cron: "0 3 * * 0" # Sundays at 03:00 UTC
  workflow_dispatch:

concurrency:
  group: ghcr-cleanup
  cancel-in-progress: false

permissions: {}

jobs:
  prune-sha-tags:
    name: Prune old sha-* tags
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      packages: write
    strategy:
      matrix:
        package:
          - apollon/apollon-webapp
          - apollon/apollon-server
    steps:
      - name: Delete stale sha-tagged versions
        uses: snok/container-retention-policy@4f22ef80902ad409ed55a99dc5133cc1250a0d03 # v3.0.0
        with:
          account: ls1intum
          token: ${{ secrets.GITHUB_TOKEN }}
          image-names: ${{ matrix.package }}
          # Match only continuous-delivery sha-* tags. Every other pattern
          # (semver releases like 3.0.1, or anything else) is explicitly
          # excluded. If a digest carries both a sha-* tag and a release
          # tag, the action's multi-tag rule refuses to delete the version
          # because at least one tag doesn't match — so release images are
          # safe on two grounds.
          image-tags: "sha-* !v* !*.*.*"
          tag-selection: tagged
          cut-off: 30d
          keep-n-most-recent: 20
