name: PR Health Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
      library: ${{ steps.filter.outputs.library }}
      should-skip: ${{ steps.skip-check.outputs.should_skip }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - id: skip-check
        uses: fkirc/skip-duplicate-actions@f75f66ce1886f00957d99748a42c724f4330bdcf # v5
        with:
          do_not_skip: '["workflow_dispatch"]'

      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        if: steps.skip-check.outputs.should_skip != 'true'
        with:
          filters: |
            code:
              - 'library/**'
              - 'standalone/**'
              - 'vscode-extension/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.npmrc'
              - '.nvmrc'
              - 'tsconfig*.json'
              - '.github/workflows/pr-health-checks.yml'
            library:
              - 'library/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/pr-health-checks.yml'

  # No path filter: a stale CDN version can drift in via a doc edit OR a bump,
  # so check every PR. Pure Node — no pnpm install needed.
  version-sync-check:
    needs: [detect-changes]
    if: needs.detect-changes.outputs.should-skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: ".nvmrc"

      - name: Check README + docs version sync
        run: node scripts/sync-library-version.mjs --check

  # The webapp and the published library are fully migrated off MUI/Emotion
  # onto Base UI + lucide + tokens. Fail fast if either creeps back into
  # source — this is the cheap backstop behind the ESLint no-restricted-imports
  # rules (a stray import in a non-linted path, or a disabled rule, still trips
  # here). Pure grep — no install needed.
  no-mui-emotion:
    needs: [detect-changes]
    if: needs.detect-changes.outputs.should-skip != 'true' && needs.detect-changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Assert no MUI/Emotion imports in webapp/library source
        run: |
          if grep -rEn "@mui|@emotion" standalone/webapp/src library/lib; then
            echo "::error::Found a @mui or @emotion reference in standalone/webapp/src or library/lib. These are fully removed — use @tumaet/ui (Base UI) + lucide-react instead."
            exit 1
          fi
          echo "No @mui/@emotion references in standalone/webapp/src or library/lib."

  lint-and-format-check:
    needs: [detect-changes]
    if: needs.detect-changes.outputs.should-skip != 'true' && needs.detect-changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install pnpm
        uses: pnpm/action-setup@ac6db6d3c1f721f886538a378a2d73e85697340a # v6.0.8

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Lint
        run: pnpm run lint

      - name: Check format
        run: pnpm run format:check

      - name: Check build
        run: pnpm run build

      - name: Enforce webapp bundle-size budget
        # Budgets in standalone/webapp/package.json#size-limit. MUI/Emotion
        # removal materially shrank the bundle — capture the win so a heavy
        # dependency (or a re-introduced CSS-in-JS runtime) can't silently
        # regress it. Runs after build so dist/ exists.
        run: pnpm --filter @tumaet/webapp run size

      - name: Typecheck docs
        # `docs/` imports `@tumaet/apollon` for the live embed, so its
        # `tsc --noEmit` resolves through the library's exports map and
        # needs `library/dist/` to exist — keep this step after build.
        run: pnpm --filter @tumaet/apollon-docs run typecheck

      - name: Run unit tests
        run: pnpm run test

      - name: Run shared-ui unit tests
        # The @tumaet/ui component suite (Base UI primitives + a11y behaviour).
        run: pnpm --filter @tumaet/ui run test

      - name: Run webapp unit tests
        # Runs after build so library/dist/react exists — the webapp suite
        # imports `@tumaet/apollon/react`, which resolves through the built
        # exports map (vitest does not alias the workspace source).
        run: pnpm --filter @tumaet/webapp run test

  # Root `pnpm run test` covers only the library. The server's vitest suite
  # (incl. the PDF-conversion regression test) spawns the compiled worker and
  # provisions Redis via testcontainers, so it gets a dedicated job: build the
  # library + server first (the worker runs from dist and imports
  # @tumaet/apollon), then run the suite against the Docker daemon the runner
  # already provides.
  server-tests:
    needs: [detect-changes]
    if: needs.detect-changes.outputs.should-skip != 'true' && needs.detect-changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install pnpm
        uses: pnpm/action-setup@ac6db6d3c1f721f886538a378a2d73e85697340a # v6.0.8

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build library and server
        run: pnpm run build:lib && pnpm run build:server

      - name: Run server tests
        run: pnpm --filter @tumaet/server run test

  e2e-tests:
    needs: [detect-changes]
    if: needs.detect-changes.outputs.should-skip != 'true' && needs.detect-changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install pnpm
        uses: pnpm/action-setup@ac6db6d3c1f721f886538a378a2d73e85697340a # v6.0.8

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build:lib

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-v1.59.1-${{ hashFiles('standalone/webapp/package.json') }}

      # The webapp also depends on `playwright` (for the Storybook browser
      # tests), which ships its own `playwright` bin. Invoke @playwright/test's
      # CLI via the `pw` script so the e2e runner + browser install are always
      # @playwright/test 1.59.1, never the other bin.
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @tumaet/webapp run pw install chromium

      - name: Install Playwright system deps
        run: pnpm --filter @tumaet/webapp run pw install-deps chromium

      - name: Run E2E tests
        run: pnpm --filter @tumaet/webapp run test:e2e

      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report-e2e
          path: standalone/webapp/playwright-report/
          retention-days: 14

      - name: Upload Playwright test results
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-test-results-e2e
          path: standalone/webapp/test-results/
          retention-days: 14

  # Library has `engines.node: ">=22"` for its published consumers — back the
  # promise with a build+test on Node 22 LTS so a Node-24-only feature can't
  # silently land in the npm tarball.
  library-node22-compat:
    needs: [detect-changes]
    if: needs.detect-changes.outputs.should-skip != 'true' && needs.detect-changes.outputs.library == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install pnpm
        uses: pnpm/action-setup@ac6db6d3c1f721f886538a378a2d73e85697340a # v6.0.8

      - name: Set up Node 22 LTS
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        # `engine-strict=true` rejects Node 22 against the root `>=24.15.0`
        # gate; library workspace is `>=22`, so install with the flag off.
        run: pnpm install --frozen-lockfile --config.engine-strict=false

      - name: Build library
        run: pnpm --filter @tumaet/apollon run build

      - name: Run library unit tests
        run: pnpm --filter @tumaet/apollon run test

      - name: Verify ESM exports-map resolution
        # The library is ESM-only. `import.meta.resolve` (sync, no side
        # effects) validates every subpath in the exports map — actually
        # evaluating the module would require jsdom.
        working-directory: standalone/server
        run: |
          node --input-type=module -e '
            const root = import.meta.resolve("@tumaet/apollon");
            const react = import.meta.resolve("@tumaet/apollon/react");
            const internals = import.meta.resolve("@tumaet/apollon/internals");
            const css = import.meta.resolve("@tumaet/apollon/style.css");
            console.log({ root, react, internals, css });
          '

      - name: Lint published package shape (publint)
        working-directory: library
        run: pnpm dlx publint

      # NOTE: arethetypeswrong/cli (attw) is intentionally not run here.
      # attw 0.16.x–0.18.x ship a buggy fflate Gunzip streaming workaround
      # in @arethetypeswrong/core's `extractTarball` that overwrites the
      # decompressed buffer on each chunk callback instead of accumulating.
      # Any tarball that decompresses across multiple fflate chunks (ours
      # is ~750 KB → 3 chunks) crashes with `Cannot read properties of
      # undefined (reading 'filename')`. The standalone subpath
      # deliberately bundles peers (~2.4 MB) so the tarball is over
      # threshold by design. `publint` above plus the `import.meta.resolve`
      # exports-map check below cover the same ground.
      - name: Enforce bundle-size budget
        working-directory: library
        # Budgets in library/package.json#size-limit. Fails on regression
        # of >10% (size-limit default) per artifact.
        run: pnpm run size

  # Baseline regeneration: see docs/development/visual-tests.md.
  visual-regression-tests:
    needs: [detect-changes]
    if: needs.detect-changes.outputs.should-skip != 'true' && needs.detect-changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Node 24
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://deb.nodesource.com/setup_24.x | bash -
          apt-get install -y nodejs
          node --version

      - name: Install pnpm
        uses: pnpm/action-setup@ac6db6d3c1f721f886538a378a2d73e85697340a # v6.0.8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build:lib

      - name: Run visual regression tests
        # Via the test:visual script (@playwright/test CLI) so the colliding
        # `playwright` bin is never used — keeps this on @playwright/test 1.59.1.
        run: pnpm --filter @tumaet/webapp run test:visual

      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report-visual
          path: standalone/webapp/playwright-report/
          retention-days: 14

      - name: Upload Playwright test results
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-test-results-visual
          path: standalone/webapp/test-results/
          retention-days: 14

  # Gate job — set this as the required status check in branch protection.
  # Correctly handles skipped jobs (docs-only, duplicate runs).
  pr-health-gate:
    name: PR Health Gate
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs:
      [
        detect-changes,
        version-sync-check,
        no-mui-emotion,
        lint-and-format-check,
        server-tests,
        library-node22-compat,
        e2e-tests,
        visual-regression-tests,
      ]
    if: always()
    steps:
      - name: Evaluate results
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more checks failed"
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more checks were cancelled"
            exit 1
          fi
          echo "All checks passed or were skipped"
