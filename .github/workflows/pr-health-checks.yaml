name: PR Health Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-format-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Check format
        run: npm run format:check

      - name: Check build
        run: npm run build

      - name: Run unit tests
        run: npm run test
        working-directory: library/

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:lib

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('standalone/webapp/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium
        working-directory: standalone/webapp/

      - name: Install Playwright system deps
        run: npx playwright install-deps chromium
        working-directory: standalone/webapp/

      - name: Run E2E tests
        run: npx playwright test tests/e2e/
        working-directory: standalone/webapp/

      # Visual regression tests are not run in CI yet.
      # Baselines must be generated inside the mcr.microsoft.com/playwright
      # Docker image to ensure consistent rendering across platforms.
      # Once baselines are committed from that image, uncomment the step
      # below to enable visual regression checks in CI.
      #
      # - name: Run visual regression tests
      #   run: npx playwright test tests/visual-regression/
      #   working-directory: standalone/webapp/

      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: standalone/webapp/playwright-report/
          retention-days: 14

      - name: Upload Playwright test results
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: standalone/webapp/test-results/
          retention-days: 14
