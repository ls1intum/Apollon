name: PR Health Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  lint-and-format-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Check format
        run: npm run format:check

      - name: Check build
        run: npm run build

      - name: Run unit tests
        run: npm run test
        working-directory: library/

  e2e-tests:
    runs-on: ubuntu-latest
    needs: lint-and-format-check
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: standalone/webapp/

      - name: Run E2E tests
        run: npx playwright test tests/e2e/
        working-directory: standalone/webapp/

      # Visual regression tests are not run in CI yet.
      # Visual regression baselines should be generated using the Playwright
      # Docker image for consistency. Once baselines are committed, uncomment
      # the step below to enable visual regression checks.
      #
      # - name: Run visual regression tests
      #   run: npx playwright test tests/visual-regression/
      #   working-directory: standalone/webapp/

      - name: Upload Playwright report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: standalone/webapp/playwright-report/
          retention-days: 14

      - name: Upload Playwright test results
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: standalone/webapp/test-results/
          retention-days: 14
