name: Verify changesets

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: verify-changesets-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --no-audit --no-fund

      - name: Check .changeset/config.json invariants
        run: npm run check:release-docs

      - name: Changesets status (advisory)
        # Forks can't fetch origin/<base>; skip rather than fail.
        if: github.event.pull_request.head.repo.full_name == github.repository
        run: npx --no -- changeset status --since=origin/${{ github.event.pull_request.base.ref }}
        continue-on-error: true
