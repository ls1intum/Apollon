name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release
  cancel-in-progress: false

# Default to no permissions; each job opts into only what it needs.
permissions: {}

jobs:
  verify-version:
    name: Verify Version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      publish-library: ${{ steps.version.outputs.publish-library }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Tag must point to a commit on main
        run: |
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag $GITHUB_REF_NAME points to $GITHUB_SHA, which is not on main. Refusing to release."
            exit 1
          fi

      - name: Tag must be strict SemVer and greater than the latest tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          # Prerelease / build-metadata tags are not supported by this
          # pipeline (sort -V orders them wrong for SemVer).
          if [[ "$TAG_VERSION" == *-* || "$TAG_VERSION" == *+* ]]; then
            echo "::error::Tag $GITHUB_REF_NAME is not strict SemVer MAJOR.MINOR.PATCH."
            exit 1
          fi
          LATEST=$(git tag --list 'v*' --sort=-v:refname | grep -v "^${GITHUB_REF_NAME}$" | head -n1 | sed 's/^v//' || true)
          if [ -n "$LATEST" ]; then
            HIGHEST=$(printf '%s\n%s\n' "$LATEST" "$TAG_VERSION" | sort -V | tail -n1)
            if [ "$HIGHEST" != "$TAG_VERSION" ] || [ "$LATEST" = "$TAG_VERSION" ]; then
              echo "::error::Tag v$TAG_VERSION is not strictly greater than latest released tag v$LATEST."
              exit 1
            fi
          fi

      - name: Extract and verify version
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          LIB_VERSION=$(node -p "require('./library/package.json').version")
          WEBAPP_VERSION=$(node -p "require('./standalone/webapp/package.json').version")
          SERVER_VERSION=$(node -p "require('./standalone/server/package.json').version")

          # Library is the version source of truth; the tag must match it,
          # and standalone (webapp + server) must match the library.
          if [ "$LIB_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::library/package.json has $LIB_VERSION but tag is v$TAG_VERSION"
            exit 1
          fi
          if [ "$WEBAPP_VERSION" != "$LIB_VERSION" ]; then
            echo "::error::standalone/webapp/package.json has $WEBAPP_VERSION but library is $LIB_VERSION"
            exit 1
          fi
          if [ "$SERVER_VERSION" != "$LIB_VERSION" ]; then
            echo "::error::standalone/server/package.json has $SERVER_VERSION but library is $LIB_VERSION"
            exit 1
          fi

          # npm publish is idempotent: skipped if the version is already on
          # the registry. Server-only hotfixes that republish unchanged
          # library content still bump the monorepo version and take this
          # path — expected under the fixed-versioning model.
          PUBLISHED=$(npm view --json "@tumaet/apollon@$LIB_VERSION" version 2>/dev/null | tr -d '"' | tr -d '[:space:]' || true)
          if [ "$PUBLISHED" = "$LIB_VERSION" ]; then
            echo "Library v$LIB_VERSION already on npm — skipping publish"
            echo "publish-library=false" >> "$GITHUB_OUTPUT"
          else
            echo "Library v$LIB_VERSION not on npm — will publish"
            echo "publish-library=true" >> "$GITHUB_OUTPUT"
          fi

          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify Docker images exist for this commit
        run: |
          for IMAGE in \
            ghcr.io/ls1intum/apollon/apollon-webapp \
            ghcr.io/ls1intum/apollon/apollon-server; do
            if ! docker buildx imagetools inspect "$IMAGE:sha-$GITHUB_SHA" > /dev/null 2>&1; then
              echo "::error::Missing image $IMAGE:sha-$GITHUB_SHA. The push-to-main Docker build for this commit must finish green before the tag can be released."
              exit 1
            fi
          done

  publish-library:
    name: Publish Library to npm
    needs: [verify-version]
    if: needs.verify-version.outputs.publish-library == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm-publish
    permissions:
      contents: read
      id-token: write # OIDC for npm trusted publishing + provenance
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org/ # required so the setup-node shim knows which audience to mint the OIDC token for

      - name: Set correct npm version
        run: npm install -g npm@11.1.0

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build
        working-directory: library

      - name: Run library tests
        run: npm run test
        working-directory: library

      - name: Publish to npm
        run: npm publish --access public --tag latest --provenance
        working-directory: library

  tag-docker-images:
    name: Tag and Sign Docker Images
    needs: [verify-version]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      packages: write # retag images in GHCR
      id-token: write # OIDC for keyless cosign signing
    strategy:
      matrix:
        image:
          - ghcr.io/ls1intum/apollon/apollon-webapp
          - ghcr.io/ls1intum/apollon/apollon-server
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@d7543c93d881b35a8faa02e8e3605f69b7a1ce62 # v3.10.0

      - name: Retag and sign
        run: |
          VERSION="${{ needs.verify-version.outputs.version }}"
          IMAGE="${{ matrix.image }}"
          COMMIT_SHA="${{ github.sha }}"

          echo "Retagging $IMAGE:sha-$COMMIT_SHA -> $IMAGE:$VERSION"
          docker buildx imagetools create \
            --tag "$IMAGE:$VERSION" \
            "$IMAGE:sha-$COMMIT_SHA"

          DIGEST=$(docker buildx imagetools inspect "$IMAGE:$VERSION" --format '{{.Manifest.Digest}}')
          echo "Signing $IMAGE@$DIGEST via cosign keyless (OIDC)"
          cosign sign --yes "$IMAGE@$DIGEST"

  create-release:
    name: Create GitHub Release
    needs: [verify-version, publish-library, tag-docker-images]
    if: always() && needs.tag-docker-images.result == 'success' && (needs.publish-library.result == 'success' || needs.publish-library.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          name: "v${{ needs.verify-version.outputs.version }}"
          generate_release_notes: true
          body: |
            ## Release artifacts

            - **Library:** [`@tumaet/apollon@${{ needs.verify-version.outputs.version }}`](https://www.npmjs.com/package/@tumaet/apollon/v/${{ needs.verify-version.outputs.version }}) (published with `--provenance`)
            - **Docker (webapp):** `ghcr.io/ls1intum/apollon/apollon-webapp:${{ needs.verify-version.outputs.version }}` (cosign-signed)
            - **Docker (server):** `ghcr.io/ls1intum/apollon/apollon-server:${{ needs.verify-version.outputs.version }}` (cosign-signed)
          prerelease: false

  deploy-staging:
    name: Deploy to Staging
    needs: [verify-version, publish-library, tag-docker-images]
    if: always() && needs.tag-docker-images.result == 'success' && (needs.publish-library.result == 'success' || needs.publish-library.result == 'skipped')
    uses: ./.github/workflows/deploy-staging.yml
    with:
      image-tag: ${{ needs.verify-version.outputs.version }}
      deploy-app: true
    secrets: inherit
