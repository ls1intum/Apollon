name: Release

on:
  release:
    types: [published]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish-library:
    name: Publish Library to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org/

      - name: Set correct npm version
        run: npm install -g npm@11.1.0

      - name: Verify version matches release tag
        run: |
          PACKAGE_VERSION=$(node -p "require('./library/package.json').version")
          TAG_NAME="${{ github.event.release.tag_name }}"
          # Strip leading 'v' from tag if present
          TAG_VERSION="${TAG_NAME#v}"

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch: library/package.json has $PACKAGE_VERSION but release tag is $TAG_NAME"
            echo "Bump the version in library/package.json before creating the release."
            exit 1
          fi
          echo "Version $PACKAGE_VERSION matches release tag $TAG_NAME"

      - name: Check if library changed since last release
        id: lib-check
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGED=$(git diff --name-only "$PREV_TAG"..HEAD -- library/ | wc -l | tr -d ' ')
          else
            CHANGED=1
          fi
          echo "changed=$([[ $CHANGED -gt 0 ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "Library changed: $CHANGED files since $PREV_TAG"

      - name: Install dependencies
        if: steps.lib-check.outputs.changed == 'true'
        run: npm ci

      - name: Build library
        if: steps.lib-check.outputs.changed == 'true'
        run: npm run build
        working-directory: library

      - name: Run library tests
        if: steps.lib-check.outputs.changed == 'true'
        run: npm run test
        working-directory: library

      - name: Determine npm dist-tag
        if: steps.lib-check.outputs.changed == 'true'
        id: dist-tag
        run: |
          VERSION=$(node -p "require('./library/package.json').version")
          if echo "$VERSION" | grep -qE "(alpha|beta|rc)"; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.lib-check.outputs.changed == 'true'
        run: npm publish --access public --tag ${{ steps.dist-tag.outputs.tag }} --provenance
        working-directory: library
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip npm publish
        if: steps.lib-check.outputs.changed != 'true'
        run: echo "Library unchanged since last release — skipping npm publish"

  tag-docker-images:
    name: Tag Docker Images
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        image:
          - ghcr.io/ls1intum/apollon/apollon-webapp
          - ghcr.io/ls1intum/apollon/apollon-server
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag image with release version
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          IMAGE="${{ matrix.image }}"
          COMMIT_SHA="${{ github.event.release.target_commitish }}"

          echo "Retagging $IMAGE:sha-$COMMIT_SHA -> $IMAGE:$TAG_NAME"
          docker buildx imagetools create \
            --tag "$IMAGE:$TAG_NAME" \
            "$IMAGE:sha-$COMMIT_SHA"

  deploy-staging:
    name: Deploy to Staging
    needs: [publish-library, tag-docker-images]
    uses: ./.github/workflows/deploy-staging.yml
    with:
      image-tag: ${{ github.event.release.tag_name }}
      deploy-app: true
    secrets: inherit
