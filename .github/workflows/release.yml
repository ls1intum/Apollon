name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  verify-version:
    name: Verify Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      library-version: ${{ steps.version.outputs.library-version }}
      publish-library: ${{ steps.version.outputs.publish-library }}
    steps:
      - uses: actions/checkout@v6

      - name: Extract and verify version
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          LIB_VERSION=$(node -p "require('./library/package.json').version")
          WEBAPP_VERSION=$(node -p "require('./standalone/webapp/package.json').version")
          SERVER_VERSION=$(node -p "require('./standalone/server/package.json').version")

          # Tag must match standalone versions
          if [ "$WEBAPP_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::standalone/webapp/package.json has $WEBAPP_VERSION but tag is v$TAG_VERSION"
            exit 1
          fi
          if [ "$SERVER_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::standalone/server/package.json has $SERVER_VERSION but tag is v$TAG_VERSION"
            exit 1
          fi

          # Check if this library version is already on npm
          PUBLISHED=$(npm view @tumaet/apollon@"$LIB_VERSION" version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "$LIB_VERSION" ]; then
            echo "Library v$LIB_VERSION already on npm — skipping publish"
            echo "publish-library=false" >> "$GITHUB_OUTPUT"
          else
            echo "Library v$LIB_VERSION not on npm — will publish"
            echo "publish-library=true" >> "$GITHUB_OUTPUT"
          fi

          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "library-version=$LIB_VERSION" >> "$GITHUB_OUTPUT"

  publish-library:
    name: Publish Library to npm
    needs: [verify-version]
    if: needs.verify-version.outputs.publish-library == 'true'
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org/

      - name: Set correct npm version
        run: npm install -g npm@11.1.0

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build
        working-directory: library

      - name: Run library tests
        run: npm run test
        working-directory: library

      - name: Publish to npm
        run: npm publish --access public --tag latest --provenance
        working-directory: library

  tag-docker-images:
    name: Tag Docker Images
    needs: [verify-version]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        image:
          - ghcr.io/ls1intum/apollon/apollon-webapp
          - ghcr.io/ls1intum/apollon/apollon-server
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag image with release version
        run: |
          VERSION="${{ needs.verify-version.outputs.version }}"
          IMAGE="${{ matrix.image }}"
          COMMIT_SHA="${{ github.sha }}"

          echo "Retagging $IMAGE:sha-$COMMIT_SHA -> $IMAGE:$VERSION"
          docker buildx imagetools create \
            --tag "$IMAGE:$VERSION" \
            "$IMAGE:sha-$COMMIT_SHA"

  create-release:
    name: Create GitHub Release
    needs: [verify-version, tag-docker-images]
    if: always() && needs.tag-docker-images.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ needs.verify-version.outputs.version }}"
          generate_release_notes: true
          prerelease: false

  deploy-staging:
    name: Deploy to Staging
    needs: [verify-version, tag-docker-images]
    uses: ./.github/workflows/deploy-staging.yml
    with:
      image-tag: ${{ needs.verify-version.outputs.version }}
      deploy-app: true
    secrets: inherit
