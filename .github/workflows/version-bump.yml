name: Version Bump

on:
  workflow_dispatch:
    inputs:
      scope:
        type: choice
        description: What changed?
        required: true
        options:
          - library
          - standalone
      bump:
        type: choice
        description: Version bump type
        required: true
        options:
          - patch
          - minor
          - major

concurrency:
  group: version-bump
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22.14.0

      - name: Set correct npm version
        run: npm install -g npm@11.1.0

      - name: Bump versions
        id: bump
        run: |
          SCOPE="${{ inputs.scope }}"
          BUMP="${{ inputs.bump }}"

          if [ "$SCOPE" = "library" ]; then
            # Library changed: bump library, then sync standalone to match
            (cd library && npm version "$BUMP" --no-git-tag-version)
            NEW_VERSION=$(node -p "require('./library/package.json').version")

            node -e "
              const fs = require('fs');
              for (const f of ['standalone/webapp/package.json', 'standalone/server/package.json']) {
                const pkg = JSON.parse(fs.readFileSync(f, 'utf8'));
                pkg.version = '$NEW_VERSION';
                fs.writeFileSync(f, JSON.stringify(pkg, null, 2) + '\n');
              }
            "
          else
            # Standalone only: bump webapp, sync server
            (cd standalone/webapp && npm version "$BUMP" --no-git-tag-version)
            NEW_VERSION=$(node -p "require('./standalone/webapp/package.json').version")

            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('standalone/server/package.json', 'utf8'));
              pkg.version = '$NEW_VERSION';
              fs.writeFileSync('standalone/server/package.json', JSON.stringify(pkg, null, 2) + '\n');
            "
          fi

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Regenerate package-lock.json
        run: npm install --package-lock-only --ignore-scripts

      - name: Commit bump
        id: commit
        env:
          VERSION: ${{ steps.bump.outputs.version }}
          SCOPE: ${{ inputs.scope }}
          BUMP: ${{ inputs.bump }}
        run: |
          BRANCH="chore/release-v${VERSION}"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add library/package.json standalone/webapp/package.json standalone/server/package.json package-lock.json

          git commit -F - <<COMMIT_MSG
          chore: release v${VERSION}

          Scope: ${SCOPE} ${BUMP}
          COMMIT_MSG

          git push origin "$BRANCH"

      - name: Open pull request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.bump.outputs.version }}
          SCOPE: ${{ inputs.scope }}
          BUMP: ${{ inputs.bump }}
          BRANCH: ${{ steps.commit.outputs.branch }}
        run: |
          cat > /tmp/pr-body.md <<PR_BODY
          **Scope:** \`${SCOPE}\` (\`${BUMP}\`)

          After this PR is merged, cut the release by pushing the matching tag from \`main\`:

          \`\`\`sh
          git checkout main && git pull
          git tag v${VERSION}
          git push origin v${VERSION}
          \`\`\`

          The \`Release\` workflow will then publish the library to npm (if the library version is new), retag Docker images from \`sha-<commit>\` to \`${VERSION}\`, create the GitHub Release, and deploy to staging.
          PR_BODY

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: release v${VERSION}" \
            --body-file /tmp/pr-body.md
