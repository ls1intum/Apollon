name: Version Bump

on:
  workflow_dispatch:
    inputs:
      bump:
        type: choice
        description: Version bump type
        required: true
        options:
          - patch
          - minor
          - major

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22.14.0

      - name: Bump version
        id: bump
        run: |
          cd library
          npm version ${{ inputs.bump }} --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          cd ..

          # Sync all package.json files to the same version
          node -e "
            const fs = require('fs');
            const files = [
              'standalone/webapp/package.json',
              'standalone/server/package.json'
            ];
            for (const f of files) {
              const pkg = JSON.parse(fs.readFileSync(f, 'utf8'));
              pkg.version = '$NEW_VERSION';
              fs.writeFileSync(f, JSON.stringify(pkg, null, 2) + '\n');
            }
          "

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          BRANCH="chore/release-v${VERSION}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout -b "$BRANCH"
          git add library/package.json standalone/webapp/package.json standalone/server/package.json
          git commit -m "chore: bump version to $VERSION"
          git push origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: release v${VERSION}" \
            --body "Bumps all package versions to \`$VERSION\`.

          After merging, create the release:
          \`\`\`
          git checkout main && git pull
          git tag v${VERSION}
          git push origin v${VERSION}
          \`\`\`"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
