name: Version Bump

on:
  workflow_dispatch:
    inputs:
      bump:
        type: choice
        description: Version bump type
        required: true
        options:
          - patch
          - minor
          - major

concurrency:
  group: version-bump
  cancel-in-progress: false

permissions: {}

jobs:
  bump:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22.14.0

      - name: Set correct npm version
        run: npm install -g npm@11.1.0

      - name: Bump library and sync standalone
        id: bump
        run: |
          # Library is the primary version source.
          (cd library && npm version "${{ inputs.bump }}" --no-git-tag-version)
          NEW_VERSION=$(node -p "require('./library/package.json').version")

          # Standalone (webapp + server) always tracks the library version.
          node -e "
            const fs = require('fs');
            for (const f of ['standalone/webapp/package.json', 'standalone/server/package.json']) {
              const pkg = JSON.parse(fs.readFileSync(f, 'utf8'));
              pkg.version = '$NEW_VERSION';
              fs.writeFileSync(f, JSON.stringify(pkg, null, 2) + '\n');
            }
          "

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Regenerate package-lock.json
        run: npm install --package-lock-only --ignore-scripts

      - name: Commit bump
        id: commit
        env:
          VERSION: ${{ steps.bump.outputs.version }}
          BUMP: ${{ inputs.bump }}
        run: |
          BRANCH="chore/release-v${VERSION}"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add library/package.json standalone/webapp/package.json standalone/server/package.json package-lock.json

          cat > /tmp/commit-msg.txt <<COMMIT_MSG
          chore: release v${VERSION}

          ${BUMP} bump of the monorepo version (library drives, standalone tracks).
          COMMIT_MSG
          git commit -F /tmp/commit-msg.txt

          git push --force-with-lease origin "$BRANCH"

      - name: Open pull request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.bump.outputs.version }}
          BUMP: ${{ inputs.bump }}
          BRANCH: ${{ steps.commit.outputs.branch }}
        run: |
          cat > /tmp/pr-body.md <<PR_BODY
          **Bump type:** \`${BUMP}\`

          All three \`package.json\` files bumped to \`${VERSION}\`: library drives the version, webapp and server track it.

          After this PR is merged, cut the release:

          \`\`\`sh
          git checkout main && git pull
          git tag v${VERSION}
          git push origin v${VERSION}
          \`\`\`

          The \`Release\` workflow then publishes \`@tumaet/apollon@${VERSION}\` to npm, retags the Docker images from \`sha-<commit>\` to \`${VERSION}\`, creates the GitHub Release, and deploys to staging.
          PR_BODY

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: release v${VERSION}" \
            --body-file /tmp/pr-body.md
